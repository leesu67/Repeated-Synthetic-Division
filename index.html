<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

    <style>
        :root {
            --board-bg: #1a3c34;
            --board-border: #5d4037;
            --text-main: #f5f5f5;
            --text-accent: #ffd54f;
            --c-dividend: #ffab91;
            --c-divisor: #80cbc4;
            --c-quotient: #fff59d;
            --c-remainder: #ef9a9a;
            --c-op: #b0bec5;
            --line-color: rgba(255,255,255,0.85);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
            background-color: #121212;
            color: var(--text-main);
            margin: 0; padding: 16px;
            display: flex; justify-content: center;
        }

        .container {
            width: 100%; max-width: 1100px;
            background: var(--board-bg);
            border: 8px solid var(--board-border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--text-accent); padding-bottom: 12px; margin-bottom: 20px;
            flex-wrap: wrap; gap: 10px;
        }
        h1 { color: var(--text-accent); margin: 0; font-size: 24px; }
        .author-tag {
            background: rgba(255, 213, 79, 0.15); border: 1px solid var(--text-accent);
            color: var(--text-accent); padding: 4px 12px; border-radius: 20px;
            font-size: 14px; font-weight: bold;
        }

        .theory-card {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid var(--text-accent);
            padding: 18px; border-radius: 6px; margin-bottom: 24px;
            line-height: 1.8; font-size: 15px;
        }
        .theory-title { color: var(--text-accent); font-weight: bold; font-size: 18px; margin-bottom: 10px; }

        .input-panel {
            background: rgba(0,0,0,0.25); padding: 18px; border-radius: 8px; margin-bottom: 24px;
        }
        .input-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 12px; }
        label { font-weight: bold; color: var(--text-accent); min-width: 150px; font-size: 15px; }
        input[type="text"] {
            flex: 1; min-width: 160px; background: #264d42; border: 1px solid #4a7c68;
            color: #fff; padding: 10px 14px; font-size: 16px; border-radius: 6px; outline: none;
        }
        input:focus { border-color: var(--text-accent); }
        .btn-calc {
            background: #1976d2; color: white; border: none; padding: 10px 24px;
            font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;
            margin-top: 8px;
        }
        .btn-calc:active { transform: scale(0.97); }

        .results-wrapper { display: none; grid-template-columns: 1fr; gap: 24px; }
        @media (min-width: 768px) {
            .results-wrapper { grid-template-columns: 1fr 1fr; }
            .full-width { grid-column: 1 / -1; }
        }

        .result-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; padding: 20px; overflow-x: auto;
        }
        .card-title {
            display: flex; align-items: center; gap: 8px; font-size: 18px; color: var(--text-accent);
            margin-bottom: 16px; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 8px;
        }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 12px; font-weight: bold; color: #000; background: var(--text-accent);
        }

        .synth-table { border-collapse: collapse; font-size: 20px; margin: 12px 0; }
        .synth-table td { padding: 6px 16px; text-align: center; white-space: nowrap; }
        .border-top { border-top: 2px solid var(--line-color); }
        .border-right { border-right: 2px solid var(--line-color); }
        
        .rem-box {
            border-left: 2px solid var(--line-color);
            border-bottom: 2px solid var(--line-color);
            border-right: 2px solid var(--line-color);
            color: var(--c-remainder) !important;
            font-weight: bold;
        }

        .c-dividend { color: var(--c-dividend); font-weight: bold; }
        .c-divisor { color: var(--c-divisor); font-weight: bold; }
        .c-quotient { color: var(--c-quotient); font-weight: bold; }
        .c-op { color: var(--c-op); }

        .proof-step {
            margin-bottom: 12px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            border-left: 3px solid #80cbc4;
        }

        .approx-box {
            background: rgba(0,0,0,0.25);
            border: 1px solid #80cbc4;
            border-radius: 8px;
            padding: 16px;
            margin-top: 12px;
        }
        .approx-val {
            font-size: 20px; font-weight: bold; color: #ffd54f; margin: 6px 0; min-height: 32px;
        }

        .katex-display { margin: 8px 0 !important; }
        .katex { color: inherit !important; font-size: 1.05em !important; }

        .footer-credit {
            text-align: center; margin-top: 24px; padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1); color: #80cbc4; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>📐 多項式變形與近似值估算系統</h1>
        <div class="author-tag">👨‍🏫 李向宇老師製作</div>
    </div>

    <div class="theory-card">
        <div class="theory-title">💡 推導核心概念：為何連續綜合除法可以求出變形多項式？</div>
        <div id="theory-content"></div>
    </div>

    <div class="input-panel">
        <div class="input-row">
            <label for="inp-f">原多項式 f(x)</label>
            <input type="text" id="inp-f" value="2, 7, 0, -14, -4" placeholder="係數以逗號分隔，如: 2, 7, 0, -14, -4">
        </div>
        <div class="input-row">
            <label for="inp-c">變形中心 (x - c)</label>
            <span style="font-size:18px;">c = </span>
            <input type="text" id="inp-c" value="2/3" style="max-width: 110px;" placeholder="整數或分數如: 2/3">
            
            <label for="inp-val-x" style="margin-left: 16px; min-width: 110px;">欲帶入之 x 值</label>
            <span style="font-size:18px;">x = </span>
            <input type="text" id="inp-val-x" value="0.667" style="max-width: 110px;" placeholder="整數、小數或分數">
        </div>
        <button class="btn-calc" onclick="App.run()">計算變形多項式與近似值</button>
    </div>

    <div id="results" class="results-wrapper">
        <div class="result-card">
            <div class="card-title"><span class="badge">步驟一</span> 連續綜合除法階梯圖</div>
            <div id="disp-synth-ladder"></div>
        </div>

        <div class="result-card">
            <div class="card-title"><span class="badge">步驟二</span> 變形多項式結果</div>
            <div id="disp-final-result"></div>
        </div>

        <div class="result-card full-width">
            <div class="card-title"><span class="badge">步驟三</span> 利用除法原理逐步代入推導過程</div>
            <div id="disp-step-proof"></div>
        </div>

        <div class="result-card full-width" style="border: 1px solid var(--text-accent);">
            <div class="card-title" style="color: var(--text-accent);">
                <span class="badge" style="background:#80cbc4;">步驟四</span> 帶入近似值求值與高次項忽略估算
            </div>
            <div id="disp-approx-eval"></div>
        </div>
    </div>

    <div class="footer-credit">
        本教學工具由 <strong>李向宇老師</strong> 設計與製作 ｜ 適用高中數學多項式單元教學
    </div>
</div>

<script>
const App = (() => {
    const MathCore = {
        toFraction(val) {
            if (Math.abs(val) < 1e-10) return { num: 0, den: 1 };
            const sign = val < 0 ? -1 : 1;
            let absVal = Math.abs(val);
            if (Math.abs(absVal - Math.round(absVal)) < 1e-7) {
                return { num: sign * Math.round(absVal), den: 1 };
            }
            let h1 = 1, h2 = 0, k1 = 0, k2 = 1;
            let b = absVal;
            for (let i = 0; i < 25; i++) {
                let a = Math.floor(b);
                let aux = h1; h1 = a * h1 + h2; h2 = aux;
                aux = k1; k1 = a * k1 + k2; k2 = aux;
                if (Math.abs(absVal - h1 / k1) < 1e-7) break;
                if (Math.abs(b - a) < 1e-7) break;
                b = 1 / (b - a);
            }
            return { num: sign * h1, den: k1 };
        },

        toFracLatex(val, showPlus = false) {
            const f = this.toFraction(val);
            if (f.num === 0) return '0';
            const absN = Math.abs(f.num);
            const signStr = f.num < 0 ? '-' : (showPlus ? '+' : '');
            if (f.den === 1) return `${signStr}${absN}`;
            return `${signStr}\\frac{${absN}}{${f.den}}`;
        },

        parseSingleValue(str) {
            if (!str?.trim()) return NaN;
            let sTrim = str.trim();
            if (sTrim.includes('/')) {
                let parts = sTrim.split('/');
                if(parts.length === 2) {
                    return parseFloat(parts[0]) / parseFloat(parts[1]);
                }
            }
            return parseFloat(sTrim);
        },

        parse(str) {
            if (!str?.trim()) return null;
            const nums = str.split(',').map(s => this.parseSingleValue(s));
            return nums.some(isNaN) ? null : nums;
        },

        toPolyLatex(coeffs, v = 'x') {
            if (!coeffs?.length) return '0';
            const deg = coeffs.length - 1;
            let parts = [];
            for (let i = 0; i <= deg; i++) {
                const c = coeffs[i], p = deg - i;
                if (Math.abs(c) < 1e-10) continue;
                const termStr = this.toTermLatex(c, p, parts.length === 0, v);
                if (termStr) parts.push(termStr);
            }
            return parts.join('') || '0';
        },

        toTermLatex(c, deg, isLeading = false, v = 'x') {
            if (Math.abs(c) < 1e-10) return '';
            const f = this.toFraction(c);
            const absN = Math.abs(f.num);
            const den = f.den;
            let sign = isLeading ? (f.num < 0 ? '-' : '') : (f.num >= 0 ? '+' : '-');
            let varStr = deg > 1 ? `${v}^{${deg}}` : (deg === 1 ? v : '');

            if (deg === 0) {
                if (den === 1) return `${sign}${absN}`;
                return `${sign}\\frac{${absN}}{${den}}`;
            } else {
                if (den === 1) {
                    let coefStr = absN === 1 ? '' : absN.toString();
                    return `${sign}${coefStr}${varStr}`;
                } else {
                    return `${sign}\\frac{${absN}}{${den}}${varStr}`;
                }
            }
        },

        toExpandedLatex(coeffs, c) {
            const deg = coeffs.length - 1;
            let cStr = '';
            if (c === 0) {
                cStr = 'x';
            } else {
                const fC = this.toFraction(c);
                if (fC.num > 0) cStr = `(x - ${this.toFracLatex(c)})`;
                else cStr = `(x + ${this.toFracLatex(-c)})`;
            }

            let parts = [];
            for (let i = 0; i <= deg; i++) {
                const a = coeffs[i]; 
                const p = deg - i;
                if (Math.abs(a) < 1e-10) continue;

                const termStr = this.toTermLatex(a, p, parts.length === 0, cStr);
                if (termStr) parts.push(termStr);
            }
            return parts.join('') || '0';
        }
    };

    const Render = {
        renderMathText(el, text) {
            if (!el) return;
            el.innerHTML = '';
            const parts = text.split('$');
            parts.forEach((part, index) => {
                if (index % 2 === 1) {
                    const span = document.createElement('span');
                    try {
                        if (window.katex) {
                            katex.render(part, span, { throwOnError: false, displayMode: false });
                        } else {
                            span.textContent = part;
                        }
                    } catch (e) {
                        span.textContent = part;
                    }
                    el.appendChild(span);
                } else {
                    el.appendChild(document.createTextNode(part));
                }
            });
        },

        _renderKatexBlock(el, latex) {
            if (!el) return;
            try { 
                if (window.katex) {
                    katex.render(latex, el, { throwOnError: false, displayMode: true }); 
                } else {
                    el.textContent = latex;
                }
            } catch(e) { el.textContent = latex; }
        },

        _renderInlineKatex(el, latex) {
            if (!el) return;
            try {
                if (window.katex) {
                    katex.render(latex, el, { throwOnError: false, displayMode: false });
                } else {
                    el.textContent = latex;
                }
            } catch(e) { el.textContent = latex; }
        },

        updateTheory(fCoeffs, c) {
            const fTex = MathCore.toPolyLatex(fCoeffs);
            const cTex = MathCore.toFracLatex(c);
            const cStr = c >= 0 ? `(x - ${cTex})` : `(x + ${MathCore.toFracLatex(-c)})`;
            const n = fCoeffs.length - 1;
            const targetTex = `f(x) = a_{${n}}${cStr}^{${n}} + a_{${n-1}}${cStr}^{${n-1}} + \\dots + a_1${cStr} + a_0`;

            const container = document.getElementById('theory-content');
            container.innerHTML = `
                <div id="th-line-0"></div>
                <div id="th-target-eq" style="margin: 8px 0;"></div>
                <ol style="margin: 6px 0; padding-left: 20px; line-height: 2.2;">
                    <li id="th-step-1"></li>
                    <li id="th-step-2"></li>
                    <li id="th-step-3"></li>
                    <li id="th-step-4"></li>
                </ol>
            `;

            this.renderMathText(document.getElementById('th-line-0'), `設多項式 $f(x) = ${fTex}$，若欲改寫為以 $${cStr}$ 為中心的多項式形式：`);
            this._renderKatexBlock(document.getElementById('th-target-eq'), targetTex);
            
            this.renderMathText(document.getElementById('th-step-1'), `第 1 次除法：$f(x) = ${cStr} \\cdot q_1(x) + a_0 \\rightarrow$ 餘式即為常數項 $a_0$。`);
            this.renderMathText(document.getElementById('th-step-2'), `第 2 次除法：將商式 $q_1(x)$ 再除以 $${cStr}$，得 $q_1(x) = ${cStr} \\cdot q_2(x) + a_1 \\rightarrow$ 餘式即為一次項係數 $a_1$。`);
            this.renderMathText(document.getElementById('th-step-3'), `代入展開：$f(x) = ${cStr} \\cdot \\left[${cStr} \\cdot q_2(x) + a_1\\right] + a_0 = a_1${cStr} + a_0 + \\dots$，展開即得低次項係數！`);
            this.renderMathText(document.getElementById('th-step-4'), `依此類推**連續做綜合除法**，每次獲得的「餘式」即為由低次到高次（$a_0, a_1, a_2, \\dots$）的係數！`);
        },

        syntheticLadder(container, A, c) {
            const n = A.length;
            let current = [...A];
            let stepsHistory = []; 

            for (let round = 0; round < n - 1; round++) {
                let row2 = [0], row3 = [current[0]];
                for (let i = 1; i < current.length; i++) {
                    let m = row3[i - 1] * c;
                    row2.push(m);
                    row3.push(current[i] + m);
                }
                stepsHistory.push({ row1: [...current], row2, row3 });
                current = row3.slice(0, -1); 
            }

            let html = '<table class="synth-table">';
            const totalCols = n + 1;

            stepsHistory.forEach((step, r) => {
                const activeLen = step.row1.length;
                
                if (r === 0) {
                    html += '<tr>';
                    for (let i = 0; i < activeLen; i++) {
                        const isLast = (i === activeLen - 1);
                        const cls = isLast ? 'c-dividend border-right' : 'c-dividend';
                        html += `<td class="${cls}" data-latex="${MathCore.toFracLatex(step.row1[i], i > 0)}"></td>`;
                    }
                    html += `<td class="c-divisor" data-latex="${MathCore.toFracLatex(c)}"></td>`;
                    for (let i = activeLen + 1; i < totalCols; i++) html += '<td></td>';
                    html += '</tr>';
                }

                html += '<tr>';
                for (let i = 0; i < activeLen; i++) {
                    const isLast = (i === activeLen - 1);
                    const cls = isLast ? 'c-op border-right' : 'c-op';
                    const ltx = i === 0 ? '' : MathCore.toFracLatex(step.row2[i], true);
                    html += `<td class="${cls}" data-latex="${ltx}"></td>`;
                }
                for (let i = activeLen; i < totalCols; i++) html += '<td></td>';
                html += '</tr>';

                html += '<tr>';
                for (let i = 0; i < activeLen; i++) {
                    const isLast = (i === activeLen - 1);
                    if (!isLast) {
                        html += `<td class="c-quotient border-top" data-latex="${MathCore.toFracLatex(step.row3[i], i > 0)}"></td>`;
                    } else {
                        html += `<td class="rem-box border-top" data-latex="${MathCore.toFracLatex(step.row3[i])}"></td>`;
                    }
                }
                for (let i = activeLen; i < totalCols; i++) html += '<td></td>';
                html += '</tr>';
            });

            html += '</table>';
            container.innerHTML = html;

            container.querySelectorAll('td[data-latex]').forEach(td => {
                const latex = td.getAttribute('data-latex');
                if (latex) {
                    this._renderInlineKatex(td, latex);
                }
            });

            let finalCoeffs = [current[0]];
            for (let i = stepsHistory.length - 1; i >= 0; i--) {
                const r3 = stepsHistory[i].row3;
                finalCoeffs.push(r3[r3.length - 1]);
            }
            return { finalCoeffs, stepsHistory };
        },

        finalResult(container, finalCoeffs, c) {
            const latex = MathCore.toExpandedLatex(finalCoeffs, c);
            
            let html = `
                <div style="font-size:16px; line-height: 2.2;">
                    <strong>餘式由低次至高次收集：</strong><br>
                    <span id="lbl-a0" style="color:#ef9a9a;"></span>, 
                    <span id="lbl-a1" style="color:#ef9a9a;"></span>, 
                    <span id="lbl-a2" style="color:#ef9a9a;"></span> ...<br>
                    
                    <div style="margin: 8px 0;">
                        <strong>各項係數 <span id="lbl-vector-sym"></span>：</strong>
                        <span id="lbl-coeff-vec"></span>
                    </div>

                    <strong>變形後多項式表示：</strong>
                    <div id="final-poly-latex" style="margin-top: 10px;"></div>
                </div>
            `;
            container.innerHTML = html;
            
            const a0Val = finalCoeffs[finalCoeffs.length - 1];
            const a1Val = finalCoeffs.length > 1 ? finalCoeffs[finalCoeffs.length - 2] : 0;
            const a2Val = finalCoeffs.length > 2 ? finalCoeffs[finalCoeffs.length - 3] : 0;

            this._renderInlineKatex(document.getElementById('lbl-a0'), `a_0 = ${MathCore.toFracLatex(a0Val)}`);
            this._renderInlineKatex(document.getElementById('lbl-a1'), `a_1 = ${MathCore.toFracLatex(a1Val)}`);
            this._renderInlineKatex(document.getElementById('lbl-a2'), `a_2 = ${MathCore.toFracLatex(a2Val)}`);
            
            this._renderInlineKatex(document.getElementById('lbl-vector-sym'), `[ a_n, \\dots, a_1, a_0 ]`);

            const remsFracArr = finalCoeffs.map(v => MathCore.toFracLatex(v)).join(', ');
            this._renderInlineKatex(document.getElementById('lbl-coeff-vec'), `[ ${remsFracArr} ]`);

            this._renderKatexBlock(document.getElementById('final-poly-latex'), `f(x) = ${latex}`);
        },

        stepByStepProof(container, fCoeffs, finalCoeffs, c, stepsHistory) {
            const cTex = MathCore.toFracLatex(c);
            const cStr = c >= 0 ? `(x - ${cTex})` : `(x + ${MathCore.toFracLatex(-c)})`;
            const rems = [...finalCoeffs].reverse();
            
            container.innerHTML = `
                <div style="line-height:2.0; font-size:15px;">
                    <div class="proof-step">
                        <div class="p-title-1"></div>
                        <div class="p-eq-1"></div>
                    </div>
                    <div class="proof-step">
                        <div class="p-title-2"></div>
                        <div class="p-eq-2"></div>
                    </div>
                    ${rems.length > 3 ? `
                    <div class="proof-step">
                        <div class="p-title-3"></div>
                        <div class="p-eq-3"></div>
                    </div>` : ''}
                    <div class="proof-step" style="border-left-color: var(--text-accent);">
                        <div class="p-title-final"></div>
                        <div class="p-eq-final"></div>
                    </div>
                </div>
            `;

            this.renderMathText(
                container.querySelector('.p-title-1'),
                `第 1 步（第一次除法）：將原式 $f(x)$ 除以 $${cStr}$，得到商式 $q_1(x)$ 與餘式 $a_0 = ${MathCore.toFracLatex(rems[0])}$：`
            );
            const q1Tex = MathCore.toPolyLatex(stepsHistory[0].row3.slice(0, -1));
            this._renderKatexBlock(container.querySelector('.p-eq-1'), `f(x) = ${cStr} \\cdot (${q1Tex}) + ${MathCore.toFracLatex(rems[0])}`);

            this.renderMathText(
                container.querySelector('.p-title-2'),
                `第 2 步（代入第二次除法）：將商式 $q_1(x)$ 再除以 $${cStr}$，得到 $q_1(x) = ${cStr} \\cdot q_2(x) + ${MathCore.toFracLatex(rems[1])}$，將其代回原式：`
            );
            const q2Tex = MathCore.toPolyLatex(stepsHistory[1].row3.slice(0, -1));
            this._renderKatexBlock(
                container.querySelector('.p-eq-2'),
                `f(x) = ${cStr} \\cdot \\left[ ${cStr} \\cdot (${q2Tex}) + ${MathCore.toFracLatex(rems[1])} \\right] + ${MathCore.toFracLatex(rems[0])} = (${q2Tex})${cStr}^2 + ${MathCore.toFracLatex(rems[1])}${cStr} + ${MathCore.toFracLatex(rems[0])}`
            );

            if (rems.length > 3) {
                this.renderMathText(
                    container.querySelector('.p-title-3'),
                    `第 3 步（繼續將商式層層展開）：持續對商式做除法，將 $q_2(x), q_3(x) \\dots$ 逐次展開代回：`
                );
                this._renderKatexBlock(
                    container.querySelector('.p-eq-3'),
                    `f(x) = ${cStr}^3 \\cdot q_3(x) + ${MathCore.toFracLatex(rems[2])}${cStr}^2 + ${MathCore.toFracLatex(rems[1])}${cStr} + ${MathCore.toFracLatex(rems[0])}`
                );
            }

            this.renderMathText(container.querySelector('.p-title-final'), `最終展開結果：`);
            const finalTex = MathCore.toExpandedLatex(finalCoeffs, c);
            this._renderKatexBlock(container.querySelector('.p-eq-final'), `f(x) = ${finalTex}`);
        },

        approxEvaluation(container, finalCoeffs, c, valX) {
            const dx = valX - c;
            const deg = finalCoeffs.length - 1;
            
            let termValues = [];
            let totalExact = 0;

            for (let i = 0; i <= deg; i++) {
                const coef = finalCoeffs[i];
                const p = deg - i;
                const val = coef * Math.pow(dx, p);
                termValues.push({ coef, p, val });
                totalExact += val;
            }

            const termLowToHigh = [...termValues].reverse();

            const a0 = termLowToHigh[0].val;
            const a1_term = termLowToHigh.length > 1 ? termLowToHigh[1].val : 0;
            const a2_term = termLowToHigh.length > 2 ? termLowToHigh[2].val : 0;

            const deg1Approx = a0 + a1_term;
            const deg2Approx = a0 + a1_term + a2_term;

            const valXFrac = MathCore.toFracLatex(valX);
            const fValXStr = `f(${valXFrac})`;

            container.innerHTML = `
                <div style="line-height: 1.8; font-size: 15px;">
                    <div id="ap-line-dx"></div>
                    
                    <div class="approx-box">
                        <strong>各次項代入後的具體數值：</strong>
                        <div id="ap-terms-list" style="margin-top: 8px;"></div>
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 16px;">
                        <div class="approx-box" style="border-color: #ffd54f;">
                            <div style="color:#ffd54f; font-weight:bold;">一次近似 (一次多項式估估看)</div>
                            <div class="approx-val" id="val-deg1"></div>
                            <small id="sub-desc-deg1"></small>
                        </div>

                        <div class="approx-box" style="border-color: #80cbc4;">
                            <div style="color:#80cbc4; font-weight:bold;">二次近似 (二次多項式估估看)</div>
                            <div class="approx-val" id="val-deg2"></div>
                            <small id="sub-desc-deg2"></small>
                        </div>

                        <div class="approx-box" style="border-color: #ef9a9a;">
                            <div style="color:#ef9a9a; font-weight:bold;">完整精確值 (True Value)</div>
                            <div class="approx-val" id="val-exact"></div>
                            <small>所有項完整相加之精確值</small>
                        </div>
                    </div>
                </div>
            `;

            this.renderMathText(
                document.getElementById('ap-line-dx'),
                `當 $x = ${valXFrac}$ 時，對應中心 $c = ${MathCore.toFracLatex(c)}$ 的微小變化量為 $\\Delta x = x - c = ${MathCore.toFracLatex(dx)}$。`
            );

            this._renderInlineKatex(document.getElementById('val-deg1'), `${fValXStr} \\approx ${MathCore.toFracLatex(deg1Approx)}`);
            this._renderInlineKatex(document.getElementById('val-deg2'), `${fValXStr} \\approx ${MathCore.toFracLatex(deg2Approx)}`);
            this._renderInlineKatex(document.getElementById('val-exact'), `${fValXStr} = ${MathCore.toFracLatex(totalExact)}`);

            this.renderMathText(document.getElementById('sub-desc-deg1'), `只取 $a_0 + a_1(x-c)$，忽略二次以上高次項`);
            this.renderMathText(document.getElementById('sub-desc-deg2'), `取至 $a_0 + a_1(x-c) + a_2(x-c)^2$`);

            let termsListEl = document.getElementById('ap-terms-list');
            termsListEl.innerHTML = '';
            termLowToHigh.forEach((t) => {
                const div = document.createElement('div');
                div.style.margin = '6px 0';
                div.style.display = 'flex';
                div.style.alignItems = 'center';
                div.style.gap = '6px';
                div.style.flexWrap = 'wrap';
                
                let pName = '';
                if (t.p === 0) pName = '常數項 $a_0$';
                else if (t.p === 1) pName = '一次項 $a_1(x-c)$';
                else pName = `$${t.p}$ 次項 $a_{${t.p}}(x-c)^{${t.p}}$`;

                const coefTex = MathCore.toFracLatex(t.coef);
                const dxTex = MathCore.toFracLatex(dx);
                const mathStr = `$${coefTex} \\times (${dxTex})^{${t.p}} = $`;

                const nameSpan = document.createElement('span');
                this.renderMathText(nameSpan, `• ${pName}：${mathStr}`);
                div.appendChild(nameSpan);
                
                const valSpan = document.createElement('strong');
                valSpan.style.color = '#ffd54f';
                this._renderInlineKatex(valSpan, MathCore.toFracLatex(t.val));
                div.appendChild(valSpan);

                termsListEl.appendChild(div);
            });
        }
    };

    function run() {
        const f = MathCore.parse(document.getElementById('inp-f').value);
        const c = MathCore.parseSingleValue(document.getElementById('inp-c').value);
        const valX = MathCore.parseSingleValue(document.getElementById('inp-val-x').value);

        if (!f || isNaN(c) || isNaN(valX)) { alert('請輸入正確的數字、分數或係數！'); return; }

        Render.updateTheory(f, c);
        const { finalCoeffs, stepsHistory } = Render.syntheticLadder(document.getElementById('disp-synth-ladder'), f, c);
        Render.finalResult(document.getElementById('disp-final-result'), finalCoeffs, c);
        Render.stepByStepProof(document.getElementById('disp-step-proof'), f, finalCoeffs, c, stepsHistory);
        Render.approxEvaluation(document.getElementById('disp-approx-eval'), finalCoeffs, c, valX);

        document.getElementById('results').style.display = 'grid';
    }

    function init() {
        if (window.katex) {
            run();
        } else {
            setTimeout(init, 50);
        }
    }

    document.addEventListener('DOMContentLoaded', init);
    return { run };
})();
</script>
</body>
</html>
